<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe — Minimax Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
/* ==========================================================================
   TIC · TAC · TOE — "Engine Readout" dark theme
   Design language: a strategy-engine console. The board is the arena,
   the readout strip below it is the AI's analysis terminal.
   ========================================================================== */

:root {
  /* Surface */
  --bg: #0a0c10;
  --panel: #12151c;
  --panel-2: #171b24;
  --console: #07080b;
  --border: #232733;
  --border-soft: rgba(255, 255, 255, 0.06);

  /* Text */
  --text-1: #eceef3;
  --text-2: #8b92a4;
  --text-3: #565d6e;

  /* Duel colors */
  --x: #4cc9f0;
  --x-dim: rgba(76, 201, 240, 0.14);
  --o: #ffb454;
  --o-dim: rgba(255, 180, 84, 0.14);

  /* System / AI accent */
  --accent: #7c5cfc;
  --accent-dim: rgba(124, 92, 252, 0.16);

  /* Result states */
  --win: #4ade80;
  --win-dim: rgba(74, 222, 128, 0.12);
  --danger: #f8717c;

  --r-lg: 22px;
  --r-md: 14px;
  --r-sm: 9px;

  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --fast: 0.16s var(--ease);
  --med: 0.3s var(--ease);

  --font-display: 'Sora', sans-serif;
  --font-body: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background:
    repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.015) 0px, rgba(255, 255, 255, 0.015) 1px, transparent 1px, transparent 48px),
    repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.015) 0px, rgba(255, 255, 255, 0.015) 1px, transparent 1px, transparent 48px),
    radial-gradient(circle at 15% 0%, rgba(124, 92, 252, 0.08) 0%, transparent 45%),
    radial-gradient(circle at 85% 100%, rgba(76, 201, 240, 0.06) 0%, transparent 45%),
    var(--bg);
  color: var(--text-1);
  font-family: var(--font-body);
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  overflow-x: hidden;
}

.app {
  width: 100%;
  max-width: 440px;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
}

/* ── HERO ── */
.hero {
  text-align: center;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.hero .eyebrow {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
}

.hero h1 {
  font-family: var(--font-display);
  font-weight: 800;
  font-size: 2.4rem;
  letter-spacing: 2px;
  background: linear-gradient(120deg, var(--x) 0%, var(--text-1) 45%, var(--o) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.hero p {
  font-size: 0.88rem;
  color: var(--text-2);
}

/* ── PANEL ── */
.panel {
  background: var(--panel);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-lg);
  padding: 1.5rem;
  box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
}

.panel-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.1rem;
}

.panel-head .tag {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 1.5px;
  color: var(--text-3);
  text-transform: uppercase;
}

.icon-btn {
  background: var(--panel-2);
  border: 1px solid var(--border-soft);
  color: var(--text-2);
  width: 34px;
  height: 34px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  transition: all var(--fast);
}

.icon-btn:hover {
  color: var(--text-1);
  border-color: var(--border);
}

.icon-btn.muted {
  color: var(--text-3);
}

/* ── SCOREBOARD ── */
.scoreboard {
  display: grid;
  grid-template-columns: 1fr auto 1fr auto 1fr;
  align-items: center;
  background: var(--panel-2);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 0.85rem 0.5rem;
  margin-bottom: 1.15rem;
}

.score-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.score-cell .label {
  font-family: var(--font-mono);
  font-size: 0.62rem;
  font-weight: 500;
  letter-spacing: 1px;
  color: var(--text-3);
  text-transform: uppercase;
}

.score-cell .val {
  font-family: var(--font-display);
  font-size: 1.55rem;
  font-weight: 700;
}

#score-left-val { color: var(--x); }
#score-right-val { color: var(--o); }
#score-draws-val { color: var(--text-2); }

.score-div {
  width: 1px;
  height: 30px;
  background: var(--border);
}

/* ── STATUS ── */
.status-row {
  text-align: center;
  min-height: 26px;
  margin-bottom: 1rem;
}

#status-message {
  font-size: 0.95rem;
  font-weight: 600;
}

.pulse-text {
  color: var(--accent);
  animation: pulse 1.3s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 0.55; }
  50% { opacity: 1; }
}

/* ── BOARD ── */
.board-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 1;
  margin-bottom: 1.15rem;
}

#game-board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 10px;
  width: 100%;
  height: 100%;
  transition: filter var(--med);
}

#game-board.ai-turn {
  filter: saturate(1.15);
}

.cell {
  background: var(--panel-2);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: clamp(2rem, 9vw, 2.9rem);
  font-weight: 700;
  user-select: none;
  position: relative;
  transition: background var(--fast), border-color var(--fast), transform var(--fast);
}

.cell:not(.taken):hover {
  background: #1c212c;
  border-color: var(--border);
  transform: translateY(-2px);
}

.cell[data-symbol="X"] {
  color: var(--x);
  text-shadow: 0 0 18px var(--x-dim);
  animation: pop 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.cell[data-symbol="O"] {
  color: var(--o);
  text-shadow: 0 0 18px var(--o-dim);
  animation: pop 0.22s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

@keyframes pop {
  from { transform: scale(0.55); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.cell.win-cell {
  background: var(--win-dim);
  border-color: var(--win);
  animation: winPulse 0.9s ease-in-out infinite alternate;
}

@keyframes winPulse {
  from { transform: scale(1); }
  to { transform: scale(1.035); }
}

#win-line {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

#win-line.hidden { display: none; }

#win-line line {
  stroke: var(--win);
  stroke-width: 5;
  stroke-linecap: round;
  filter: drop-shadow(0 0 6px rgba(74, 222, 128, 0.6));
}

/* ── ENGINE READOUT (signature element) ── */
.engine-readout {
  background: var(--console);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-md);
  padding: 0.7rem 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--font-mono);
  margin-bottom: 1.25rem;
}

.engine-status {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.68rem;
  color: var(--text-3);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.engine-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-3);
  transition: background var(--fast);
}

.panel:has(#game-board.ai-turn) .engine-dot {
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: dotPulse 0.8s ease-in-out infinite;
}

@keyframes dotPulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

.engine-stats {
  display: flex;
  gap: 1.1rem;
}

.engine-stats .stat {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 1px;
}

.engine-stats .stat .k {
  font-size: 0.6rem;
  color: var(--text-3);
  letter-spacing: 1px;
}

.engine-stats .stat .v {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-1);
}

/* ── CONTROLS ── */
.controls {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.ctrl-label {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 1.5px;
  color: var(--text-3);
  text-transform: uppercase;
  margin-bottom: 0.5rem;
  display: block;
}

.seg {
  display: flex;
  background: var(--panel-2);
  border: 1px solid var(--border-soft);
  border-radius: var(--r-sm);
  padding: 3px;
  gap: 3px;
}

.seg button {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-2);
  font-family: var(--font-body);
  font-size: 0.8rem;
  font-weight: 600;
  padding: 0.55rem 0.4rem;
  border-radius: 7px;
  cursor: pointer;
  transition: all var(--fast);
}

.seg button:hover {
  color: var(--text-1);
}

.seg button.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 4px 14px var(--accent-dim);
}

#ai-config-section {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.hidden { display: none !important; }

.btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.75rem;
  margin-top: 0.25rem;
}

.btn {
  background: var(--panel-2);
  border: 1px solid var(--border-soft);
  color: var(--text-1);
  font-family: var(--font-body);
  font-size: 0.82rem;
  font-weight: 600;
  padding: 0.7rem 1rem;
  border-radius: var(--r-sm);
  cursor: pointer;
  transition: all var(--fast);
}

.btn:hover {
  border-color: var(--border);
  transform: translateY(-1px);
}

.btn-danger {
  color: var(--danger);
}

.btn-danger:hover {
  background: rgba(248, 113, 124, 0.08);
  border-color: var(--danger);
}

footer {
  text-align: center;
  font-family: var(--font-mono);
  font-size: 0.68rem;
  color: var(--text-3);
  letter-spacing: 0.5px;
}

footer span {
  color: var(--text-2);
}

@media (max-width: 380px) {
  .panel { padding: 1.15rem; }
  .hero h1 { font-size: 2rem; }
  .score-cell .val { font-size: 1.25rem; }
}

  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.2/confetti.browser.min.js"></script>
  <script>
/**
 * ai.js - Tic-Tac-Toe AI Agent
 * Implements Minimax with Alpha-Beta Pruning, with support for different difficulties:
 * - Easy: Random moves
 * - Medium: 60% chance optimal minimax, 40% chance random
 * - Unbeatable: 100% optimal minimax with Alpha-Beta Pruning
 */

// Win combinations in Tic-Tac-Toe
const WIN_COMBOS = [
  [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
  [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
  [0, 4, 8], [2, 4, 6]             // Diagonals
];

/**
 * Check if there is a winner on the board.
 * @param {Array} board - 9-element array representing the board
 * @returns {string|null} - 'X', 'O', or null if no winner
 */
function checkWinner(board) {
  for (let combo of WIN_COMBOS) {
    const [a, b, c] = combo;
    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      return board[a];
    }
  }
  return null;
}

/**
 * Check if the board is completely full.
 * @param {Array} board - 9-element array representing the board
 * @returns {boolean} - true if full, false otherwise
 */
function isBoardFull(board) {
  return board.every(cell => cell !== '');
}

// Global nodes counter to showcase search complexity
let nodesEvaluated = 0;

/**
 * Minimax algorithm with Alpha-Beta Pruning
 */
function minimax(board, depth, isMaximizing, aiPlayer, huPlayer, alpha, beta) {
  nodesEvaluated++;

  // Check terminal states
  const winner = checkWinner(board);
  if (winner === aiPlayer) {
    return 10 - depth; // Favor quicker wins
  }
  if (winner === huPlayer) {
    return depth - 10; // Delay losses
  }
  if (isBoardFull(board)) {
    return 0; // Draw
  }

  if (isMaximizing) {
    let maxEval = -Infinity;
    for (let i = 0; i < 9; i++) {
      if (board[i] === '') {
        board[i] = aiPlayer;
        let score = minimax(board, depth + 1, false, aiPlayer, huPlayer, alpha, beta);
        board[i] = ''; // Undo move
        maxEval = Math.max(maxEval, score);
        alpha = Math.max(alpha, score);
        if (beta <= alpha) {
          break; // Beta cut-off
        }
      }
    }
    return maxEval;
  } else {
    let minEval = Infinity;
    for (let i = 0; i < 9; i++) {
      if (board[i] === '') {
        board[i] = huPlayer;
        let score = minimax(board, depth + 1, true, aiPlayer, huPlayer, alpha, beta);
        board[i] = ''; // Undo move
        minEval = Math.min(minEval, score);
        beta = Math.min(beta, score);
        if (beta <= alpha) {
          break; // Alpha cut-off
        }
      }
    }
    return minEval;
  }
}

/**
 * Find the best move for the AI.
 */
function getBestMove(board, difficulty, aiPlayer, huPlayer) {
  nodesEvaluated = 0;
  
  // Find all available spots
  const availableMoves = [];
  for (let i = 0; i < 9; i++) {
    if (board[i] === '') {
      availableMoves.push(i);
    }
  }

  // If board is full, no moves to make
  if (availableMoves.length === 0) return { index: -1, nodes: 0 };

  // Handle Easy Difficulty: Pure Random Moves
  if (difficulty === 'easy') {
    const randomIndex = Math.floor(Math.random() * availableMoves.length);
    return { index: availableMoves[randomIndex], nodes: 1 };
  }

  // Handle Medium Difficulty: 60% optimal move, 40% random move
  if (difficulty === 'medium') {
    const isOptimal = Math.random() < 0.6;
    if (!isOptimal) {
      const randomIndex = Math.floor(Math.random() * availableMoves.length);
      return { index: availableMoves[randomIndex], nodes: 1 };
    }
    // Otherwise fall through to calculating optimal move
  }

  // Unbeatable Mode (Minimax with Alpha-Beta)
  let bestScore = -Infinity;
  let bestMoves = [];

  for (let i = 0; i < 9; i++) {
    if (board[i] === '') {
      board[i] = aiPlayer;
      let score = minimax(board, 0, false, aiPlayer, huPlayer, -Infinity, Infinity);
      board[i] = ''; // Undo move

      if (score > bestScore) {
        bestScore = score;
        bestMoves = [i];
      } else if (score === bestScore) {
        bestMoves.push(i);
      }
    }
  }

  const chosenMove = bestMoves[Math.floor(Math.random() * bestMoves.length)];

  return {
    index: chosenMove,
    nodes: nodesEvaluated
  };
}


// Sound Effects Manager using Web Audio API
class SoundManager {
  constructor() {
    this.ctx = null;
    this.muted = false;
  }

  init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
  }

  playTone(freq, type, duration, delay = 0) {
    if (this.muted) return;
    this.init();
    
    if (this.ctx.state === 'suspended') {
      this.ctx.resume();
    }

    setTimeout(() => {
      try {
        const osc = this.ctx.createOscillator();
        const gainNode = this.ctx.createGain();

        osc.type = type;
        osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
        
        gainNode.gain.setValueAtTime(0.15, this.ctx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + duration);

        osc.connect(gainNode);
        gainNode.connect(this.ctx.destination);

        osc.start();
        osc.stop(this.ctx.currentTime + duration);
      } catch (e) {
        console.warn("Sound playback failed", e);
      }
    }, delay * 1000);
  }

  playClick(isX = true) {
    const freq = isX ? 523.25 : 659.25;
    this.playTone(freq, 'triangle', 0.15);
  }

  playWin() {
    const now = 0;
    this.playTone(261.63, 'sine', 0.3, now);
    this.playTone(329.63, 'sine', 0.3, now + 0.1);
    this.playTone(392.00, 'sine', 0.3, now + 0.2);
    this.playTone(523.25, 'sine', 0.5, now + 0.3);
  }

  playLose() {
    const now = 0;
    this.playTone(311.13, 'sawtooth', 0.4, now);
    this.playTone(293.66, 'sawtooth', 0.4, now + 0.15);
    this.playTone(246.94, 'sawtooth', 0.6, now + 0.3);
  }

  playDraw() {
    const now = 0;
    this.playTone(293.66, 'triangle', 0.3, now);
    this.playTone(293.66, 'triangle', 0.5, now + 0.25);
  }
}

// Game State variables

const scores = {

const modePvpBtn = document.getElementById('mode-pvp');
const modeAiBtn = document.getElementById('mode-ai');
const aiConfigSection = document.getElementById('ai-config-section');

const diffEasyBtn = document.getElementById('diff-easy');
const diffMediumBtn = document.getElementById('diff-medium');
const diffUnbeatableBtn = document.getElementById('diff-unbeatable');
const startPlayerBtn = document.getElementById('start-player');
const startAiBtn = document.getElementById('start-ai');

const scoreLeftLabel = document.getElementById('score-left-label');
const scoreLeftVal = document.getElementById('score-left-val');
const scoreRightLabel = document.getElementById('score-right-label');
const scoreRightVal = document.getElementById('score-right-val');
const scoreDrawsVal = document.getElementById('score-draws-val');

const resetBoardBtn = document.getElementById('reset-board-btn');
const resetScoresBtn = document.getElementById('reset-scores-btn');
const nodesCountEl = document.getElementById('nodes-count');
const searchTimeEl = document.getElementById('search-time');
const svgLine = document.getElementById('win-line');

function initGame() {
  setupEventListeners();
  updateScoresUI();
  resetBoard();
}

function setupEventListeners() {
  cells.forEach((cell, index) => {
    cell.addEventListener('click', () => handleCellClick(cell, index));
  });

  soundToggleBtn.addEventListener('click', () => {
    sound.muted = !sound.muted;
    sound.init();
    soundToggleBtn.innerHTML = sound.muted 
      ? '<i class="fas fa-volume-mute"></i>' 
      : '<i class="fas fa-volume-up"></i>';
    soundToggleBtn.classList.toggle('muted', sound.muted);
  });

  modePvpBtn.addEventListener('click', () => setGameMode('pvp'));
  modeAiBtn.addEventListener('click', () => setGameMode('ai'));

  diffEasyBtn.addEventListener('click', () => setDifficulty('easy'));
  diffMediumBtn.addEventListener('click', () => setDifficulty('medium'));
  diffUnbeatableBtn.addEventListener('click', () => setDifficulty('unbeatable'));

  startPlayerBtn.addEventListener('click', () => setStartingPlayer('player'));
  startAiBtn.addEventListener('click', () => setStartingPlayer('ai'));

  resetBoardBtn.addEventListener('click', resetBoard);
  resetScoresBtn.addEventListener('click', resetScores);
}

function setGameMode(mode) {
  if (gameMode === mode) return;
  gameMode = mode;
  
  modePvpBtn.classList.toggle('active', mode === 'pvp');
  modeAiBtn.classList.toggle('active', mode === 'ai');
  
  if (mode === 'ai') {
    aiConfigSection.classList.remove('hidden');
  } else {
    aiConfigSection.classList.add('hidden');
  }
  
  updateScoresUI();
  resetBoard();
}

function setDifficulty(diff) {
  if (difficulty === diff) return;
  difficulty = diff;
  
  diffEasyBtn.classList.toggle('active', diff === 'easy');
  diffMediumBtn.classList.toggle('active', diff === 'medium');
  diffUnbeatableBtn.classList.toggle('active', diff === 'unbeatable');
  
  resetBoard();
}

function setStartingPlayer(starter) {
  if (startingPlayer === starter) return;
  startingPlayer = starter;
  
  startPlayerBtn.classList.toggle('active', starter === 'player');
  startAiBtn.classList.toggle('active', starter === 'ai');
  
  if (startingPlayer === 'player') {
    playerSymbol = 'X';
    aiSymbol = 'O';
  } else {
    playerSymbol = 'O';
    aiSymbol = 'X';
  }
  
  resetBoard();
}

function updateScoresUI() {
  if (gameMode === 'pvp') {
    scoreLeftLabel.textContent = 'Player X';
    scoreLeftVal.textContent = scores.pvp.x;
    scoreRightLabel.textContent = 'Player O';
    scoreRightVal.textContent = scores.pvp.o;
    scoreDrawsVal.textContent = scores.pvp.draws;
  } else {
    scoreLeftLabel.textContent = 'You (Human)';
    scoreLeftVal.textContent = scores.ai.player;
    scoreRightLabel.textContent = 'AI Agent';
    scoreRightVal.textContent = scores.ai.ai;
    scoreDrawsVal.textContent = scores.ai.draws;
  }
}

function handleCellClick(cell, index) {
  if (!gameActive || board[index] !== '' || isAiThinking) return;

  sound.init();
  
  makeMove(index, currentTurn);
  
  if (checkGameStatus()) return;

  currentTurn = currentTurn === 'X' ? 'O' : 'X';
  updateStatusMessage();

  if (gameMode === 'ai' && currentTurn === aiSymbol) {
    triggerAiMove();
  }
}

function makeMove(index, symbol) {
  board[index] = symbol;
  const cell = cells[index];
  
  cell.textContent = symbol;
  cell.setAttribute('data-symbol', symbol);
  cell.classList.add('taken');
  
  sound.playClick(symbol === 'X');
}

function triggerAiMove() {
  isAiThinking = true;
  statusMessageEl.innerHTML = `<span class="pulse-text">AI Agent is calculating optimal move...</span>`;
  gameBoardEl.classList.add('ai-turn');

  const startSearchTime = performance.now();
  
  setTimeout(() => {
    const result = getBestMove(board, difficulty, aiSymbol, playerSymbol);
    const endSearchTime = performance.now();
    const searchDurationMs = (endSearchTime - startSearchTime).toFixed(1);

    if (nodesCountEl) nodesCountEl.textContent = result.nodes;
    if (searchTimeEl) searchTimeEl.textContent = `${searchDurationMs}ms`;

    if (result.index !== -1) {
      makeMove(result.index, aiSymbol);
      
      isAiThinking = false;
      gameBoardEl.classList.remove('ai-turn');
      
      if (checkGameStatus()) return;
      
      currentTurn = playerSymbol;
      updateStatusMessage();
    }
  }, 450);
}

function checkGameStatus() {
  for (let combo of WIN_COMBOS) {
    const [a, b, c] = combo;
    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      endGame(board[a], combo);
      return true;
    }
  }

  if (board.every(cell => cell !== '')) {
    endGame('draw');
    return true;
  }

  return false;
}

function endGame(result, winningCombo = null) {
  gameActive = false;

  if (result === 'draw') {
    if (gameMode === 'pvp') {
      scores.pvp.draws++;
    } else {
      scores.ai.draws++;
    }
    statusMessageEl.textContent = "It's a Draw!";
    sound.playDraw();
  } else {
    let isPlayerWin = false;
    let isAiWin = false;

    if (gameMode === 'pvp') {
      if (result === 'X') {
        scores.pvp.x++;
        statusMessageEl.textContent = "Player X Wins!";
      } else {
        scores.pvp.o++;
        statusMessageEl.textContent = "Player O Wins!";
      }
    } else {
      if (result === playerSymbol) {
        scores.ai.player++;
        statusMessageEl.textContent = "You Win! Dynamic AI defeated.";
        isPlayerWin = true;
      } else {
        scores.ai.ai++;
        statusMessageEl.textContent = "AI Agent Wins! Unbeatable AI rules.";
        isAiWin = true;
      }
    }

    if (gameMode === 'pvp' || isPlayerWin) {
      sound.playWin();
      triggerConfetti();
    } else {
      sound.playLose();
    }

    if (winningCombo) {
      highlightWinningCells(winningCombo);
      drawWinningLine(winningCombo);
    }
  }

  updateScoresUI();
}

function highlightWinningCells(combo) {
  combo.forEach(idx => {
    cells[idx].classList.add('win-cell');
  });
}

function drawWinningLine(combo) {
  const cellA = cells[combo[0]];
  const cellC = cells[combo[2]];
  
  const rectA = cellA.getBoundingClientRect();
  const rectC = cellC.getBoundingClientRect();
  const boardRect = gameBoardEl.getBoundingClientRect();

  const x1 = rectA.left - boardRect.left + rectA.width / 2;
  const y1 = rectA.top - boardRect.top + rectA.height / 2;
  const x2 = rectC.left - boardRect.left + rectC.width / 2;
  const y2 = rectC.top - boardRect.top + rectC.height / 2;

  const lineEl = svgLine.querySelector('line');
  lineEl.setAttribute('x1', x1);
  lineEl.setAttribute('y1', y1);
  lineEl.setAttribute('x2', x2);
  lineEl.setAttribute('y2', y2);
  
  const length = Math.sqrt((x2 - x1)**2 + (y2 - y1)**2);
  lineEl.style.strokeDasharray = length;
  lineEl.style.strokeDashoffset = length;
  
  lineEl.getBoundingClientRect();
  
  lineEl.style.strokeDashoffset = '0';
  svgLine.classList.remove('hidden');
}

function resetBoard() {
  board = ['', '', '', '', '', '', '', '', ''];
  gameActive = true;
  isAiThinking = false;
  
  cells.forEach(cell => {
    cell.textContent = '';
    cell.removeAttribute('data-symbol');
    cell.className = 'cell';
  });

  svgLine.classList.add('hidden');
  const lineEl = svgLine.querySelector('line');
  lineEl.setAttribute('x1', '0');
  lineEl.setAttribute('y1', '0');
  lineEl.setAttribute('x2', '0');
  lineEl.setAttribute('y2', '0');

  if (nodesCountEl) nodesCountEl.textContent = '0';
  if (searchTimeEl) searchTimeEl.textContent = '0ms';

  if (gameMode === 'pvp') {
    currentTurn = 'X';
  } else {
    currentTurn = 'X';
  }

  gameBoardEl.classList.remove('ai-turn');
  updateStatusMessage();

  if (gameMode === 'ai' && startingPlayer === 'ai') {
    triggerAiMove();
  }
}

function resetScores() {
  scores.pvp = { x: 0, o: 0, draws: 0 };
  scores.ai = { player: 0, ai: 0, draws: 0 };
  updateScoresUI();
  resetBoard();
}

function updateStatusMessage() {
  if (!gameActive) return;
  
  if (gameMode === 'pvp') {
    statusMessageEl.textContent = `Player ${currentTurn}'s Turn`;
  } else {
    if (currentTurn === playerSymbol) {
      statusMessageEl.textContent = "Your Turn (X)";
    } else {
      statusMessageEl.textContent = "AI's Turn (O)";
    }
  }
}

function triggerConfetti() {
  if (window.confetti) {
    window.confetti({
      particleCount: 120,
      spread: 70,
      origin: { y: 0.6 },
      colors: ['#4cc9f0', '#ffb454', '#7c5cfc', '#4ade80']
    });
  } else {
    const canvas = document.createElement('canvas');
    canvas.style.position = 'fixed';
    canvas.style.top = '0';
    canvas.style.left = '0';
    canvas.style.width = '100vw';
    canvas.style.height = '100vh';
    canvas.style.pointerEvents = 'none';
    canvas.style.zIndex = '9999';
    document.body.appendChild(canvas);

    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const colors = ['#4cc9f0', '#ffb454', '#7c5cfc', '#4ade80'];

    for (let i = 0; i < 100; i++) {
      particles.push({
        x: canvas.width / 2,
        y: canvas.height * 0.6,
        vx: (Math.random() - 0.5) * 15,
        vy: (Math.random() - 0.75) * 15,
        radius: Math.random() * 5 + 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        alpha: 1,
        decay: Math.random() * 0.015 + 0.01
      });
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;

      particles.forEach(p => {
        if (p.alpha > 0) {
          alive = true;
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.3;
          p.alpha -= p.decay;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.globalAlpha = p.alpha;
          ctx.fill();
        }
      });

      if (alive) {
        requestAnimationFrame(animate);
      } else {
        document.body.removeChild(canvas);
      }
    }

    animate();
  }
}

window.addEventListener('load', initGame);
window.addEventListener('resize', () => {
  if (!gameActive && board.some(cell => cell !== '')) {
    let winningCombo = null;
    for (let combo of WIN_COMBOS) {
      const [a, b, c] = combo;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        winningCombo = combo;
        break;
      }
    }
    if (winningCombo) {
      drawWinningLine(winningCombo);
    }
  }
});

  </script>
</body>
